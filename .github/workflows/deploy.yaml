name: Deploy billforge

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build & Deploy to Windows Server
    runs-on: self-hosted

    steps:
      # -------------------------
      # 1. Checkout (ke default folder runner)
      # -------------------------
      - name: Checkout source
        uses: actions/checkout@v4

      # -------------------------
      # 2. Build frontend
      # -------------------------
      - name: Install dependencies & build frontend
        working-directory: invoice-frontend
        shell: powershell
        run: |
          Write-Host ">> Install npm deps..."
          cmd /c "C:\nvm4w\nodejs\npm.cmd install"
          Write-Host ">> Build frontend..."
          cmd /c "C:\nvm4w\nodejs\npm.cmd run build"
          Write-Host ">> Frontend build selesai"

      # -------------------------
      # 3. Copy semua file ke C:\invoice
      # -------------------------
      - name: Copy project files to C:\invoice
        shell: powershell
        run: |
          Write-Host ">> Copying files to C:\invoice..."
          
          # Stop service dulu sebelum copy
          & "C:\invoice\billforge-service.exe" stop
          Start-Sleep -Seconds 3

          # Copy backend
          Copy-Item -Path "backend_invoice\*" `
            -Destination "C:\invoice\backend_invoice" `
            -Recurse -Force

          # Copy frontend build
          Copy-Item -Path "invoice-frontend\dist\*" `
            -Destination "C:\invoice\invoice-frontend\dist" `
            -Recurse -Force

          Write-Host ">> Copy selesai"

      # -------------------------
      # 4. Install Python dependencies
      # -------------------------
      - name: Install Python dependencies
        shell: powershell
        run: |
          Write-Host ">> Installing Python deps..."
          C:\laragon\bin\python\python-3.10\python.exe -m pip install `
            -r C:\invoice\backend_invoice\requirements.txt --quiet
          Write-Host ">> Done"

      # -------------------------
      # 5. Restart service
      # -------------------------
      - name: Restart billforge service
        shell: powershell
        run: |
          Write-Host ">> Starting billforge service..."
          & "C:\invoice\billforge-service.exe" start
          Write-Host ">> Deploy selesai"