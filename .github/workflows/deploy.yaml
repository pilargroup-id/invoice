name: Deploy billforge

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build & Deploy to Windows Server
    runs-on: self-hosted

    steps:
      # -------------------------
      # 1. Checkout
      # -------------------------
      - name: Checkout source
        uses: actions/checkout@v4

      # -------------------------
      # 2. Build frontend
      # -------------------------
      - name: Install npm dependencies
        working-directory: invoice-frontend
        shell: cmd
        run: C:\nvm4w\nodejs\npm.cmd install

      - name: Build frontend
        working-directory: invoice-frontend
        shell: cmd
        run: C:\nvm4w\nodejs\npm.cmd run build

      # -------------------------
      # 3. Stop service
      # -------------------------
      - name: Stop billforge service
        shell: powershell
        run: |
          Write-Host ">> Stopping BillForge service..."
          Stop-Service -Name "BillForge" -Force -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 3
          Write-Host ">> Service stopped"

      # -------------------------
      # 4. Copy backend files
      # -------------------------
      - name: Copy backend files
        shell: powershell
        run: |
          Write-Host ">> Copying backend_invoice..."
          Copy-Item -Path "backend_invoice\*" `
            -Destination "C:\invoice\backend_invoice" `
            -Recurse -Force -Exclude "uploads","outputs","__pycache__"
          Write-Host ">> Done"

      # -------------------------
      # 5. Copy frontend dist
      # -------------------------
      - name: Copy frontend dist
        shell: powershell
        run: |
          Write-Host ">> Copying frontend dist..."
          $dst = "C:\invoice\invoice-frontend\dist"
          if (-not (Test-Path $dst)) {
            New-Item -ItemType Directory -Path $dst -Force
          }
          Copy-Item -Path "invoice-frontend\dist\*" `
            -Destination $dst `
            -Recurse -Force
          Write-Host ">> Done"

      # -------------------------
      # 6. Install Python dependencies
      # -------------------------
      - name: Install Python dependencies
        shell: powershell
        run: |
          Write-Host ">> Installing Python deps..."
          C:\laragon\bin\python\python-3.10\python.exe -m pip install `
            -r C:\invoice\backend_invoice\requirements.txt --quiet
          Write-Host ">> Done"

      # -------------------------
      # 7. Start service
      # -------------------------
      - name: Start billforge service
        shell: powershell
        run: |
          Write-Host ">> Starting BillForge service..."
          Start-Service -Name "BillForge"
          Write-Host ">> Deploy selesai"